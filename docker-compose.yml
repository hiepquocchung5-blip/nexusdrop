services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexusdrop
      POSTGRES_USER: nexusdrop
      POSTGRES_PASSWORD: nexusdrop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusdrop"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    command: celery -A nexusdrop worker -l info
    env_file:
      - backend/.env
    volumes:
      - media_data:/app/media
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - backend

  ngrok:
    build:
      context: ./ngrok
    entrypoint: ["/bin/sh", "/tmp/ngrok-entrypoint.sh"]
    environment:
      SSL_CERT_FILE: /etc/ssl/certs/ngrok-ca-bundle.crt
      SSL_CERT_DIR: /etc/ssl/certs
    env_file:
      - backend/.env
    volumes:
      - ./ngrok-entrypoint.sh:/tmp/ngrok-entrypoint.sh:ro
    ports:
      - "4040:4040"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
